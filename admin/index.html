<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Admin — Portal Jawa</title>
<link rel="stylesheet" href="../assets/style.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f0f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--sans, 'Inter', sans-serif);
  }

  .login-wrap {
    width: 100%;
    max-width: 400px;
    padding: 20px;
  }

  .login-logo {
    text-align: center;
    margin-bottom: 32px;
  }

  .login-logo img {
    height: 40px;
    filter: brightness(0) invert(1);
    object-fit: contain;
  }

  .login-box {
    background: #fff;
    padding: 36px 32px;
    border-top: 4px solid #c0392b;
  }

  .login-title {
    font-size: 20px;
    font-weight: 800;
    color: #111;
    margin-bottom: 4px;
    font-family: var(--serif, Georgia, serif);
  }

  .login-sub {
    font-size: 13px;
    color: #888;
    margin-bottom: 28px;
  }

  .login-field {
    margin-bottom: 16px;
  }

  .login-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .8px;
    text-transform: uppercase;
    color: #555;
    margin-bottom: 6px;
  }

  .login-field input {
    width: 100%;
    border: 1px solid #ddd;
    padding: 11px 14px;
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color .2s;
    color: #111;
  }

  .login-field input:focus {
    border-color: #c0392b;
  }

  .login-btn {
    width: 100%;
    background: #c0392b;
    color: #fff;
    border: none;
    padding: 13px;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: inherit;
    cursor: pointer;
    margin-top: 8px;
    transition: background .2s;
  }

  .login-btn:hover { background: #a93226; }
  .login-btn:disabled { background: #ccc; cursor: not-allowed; }

  .login-err {
    background: #fdf0ef;
    border: 1px solid #f5c6c2;
    color: #c0392b;
    font-size: 13px;
    padding: 10px 14px;
    margin-bottom: 16px;
    display: none;
  }

  .login-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 12px;
    color: #555;
  }

  .login-footer a {
    color: #888;
    text-decoration: none;
  }

  .spinner-sm {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="login-wrap">
  <div class="login-logo">
    <img src="../assets/logo_headline.png" alt="Portal Jawa">
  </div>

  <div class="login-box">
    <div class="login-title">Admin Panel</div>
    <p class="login-sub">Masuk untuk mengelola Portal Jawa</p>

    <div class="login-err" id="loginErr"></div>

    <div class="login-field">
      <label>Email</label>
      <input type="email" id="inputEmail" placeholder="email@portaljawa.com" autocomplete="email">
    </div>

    <div class="login-field">
      <label>Password</label>
      <input type="password" id="inputPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="login-btn" id="loginBtn" onclick="doLogin()">Masuk</button>
  </div>

  <div class="login-footer">
    <a href="../index.html">← Kembali ke Portal Jawa</a>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://trtjriudwgjyabqvwbtt.supabase.co';
const SUPABASE_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRydGpyaXVkd2dqeWFicXZ3YnR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MzU5ODYsImV4cCI6MjA4OTExMTk4Nn0._ygsO_LE_rFO7KZBbXTCr5haGsL7vSCwU7yis5ozsws';

// Kalau sudah login, langsung ke dashboard
(async () => {
  const token = localStorage.getItem('sb_access_token');
  if (!token) return;
  // Verifikasi token masih valid
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: { 'Authorization': `Bearer ${token}`, 'apikey': SUPABASE_KEY }
    });
    if (res.ok) window.location.replace('dashboard.html');
  } catch(e) {}
})();

// Enter key submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const email    = document.getElementById('inputEmail').value.trim();
  const password = document.getElementById('inputPassword').value;
  const btn      = document.getElementById('loginBtn');
  const errEl    = document.getElementById('loginErr');

  errEl.style.display = 'none';

  if (!email || !password) {
    showErr('Email dan password wajib diisi.');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>Masuk...';

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY
      },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.error_description || data.msg || 'Email atau password salah.');
    }

    // Simpan token
    localStorage.setItem('sb_access_token', data.access_token);
    localStorage.setItem('sb_refresh_token', data.refresh_token);
    localStorage.setItem('sb_user_email', data.user?.email || email);

    // Redirect ke dashboard
    window.location.replace('dashboard.html');

  } catch(e) {
    showErr(e.message);
    btn.disabled = false;
    btn.textContent = 'Masuk';
  }
}

function showErr(msg) {
  const el = document.getElementById('loginErr');
  el.textContent = msg;
  el.style.display = 'block';
}
</script>
</body>
</html>
